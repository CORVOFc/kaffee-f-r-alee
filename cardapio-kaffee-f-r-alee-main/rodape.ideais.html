<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DevStudio Footer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #d4d4d4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .footer { padding: 0 24px 32px; }
  .footer-inner { max-width: 1200px; margin: 0 auto; }
  .divider { border-top: 1px solid #262626; }
  .divider-dashed { border-top: 1px dashed #333; margin-top: 48px; }

  .brand-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 48px;
  }
  .brand-name { color: #fff; font-size: 18px; font-weight: 600; }

  .nav {
    margin-top: 32px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px 32px;
  }
  .nav a {
    color: #d4d4d4;
    text-decoration: none;
    font-size: 14px;
    transition: color .2s;
  }
  .nav a:hover { color: #fff; }

  .bottom {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    align-items: center;
    justify-content: space-between;
  }
  @media (min-width: 640px) {
    .bottom { flex-direction: row; }
  }
  .copyright { color: #737373; font-size: 14px; }
  .socials {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px 24px;
  }
  .socials a {
    color: #a3a3a3;
    text-decoration: none;
    font-size: 14px;
    transition: color .2s;
  }
  .socials a:hover { color: #fff; }
</style>
</head>
<body>
  <footer class="footer">
    <div class="footer-inner">
      <div class="divider"></div>

      <div class="brand-block">
        <span class="brand-name">DevStudio</span>
        <nav class="nav" id="footer-nav"></nav>
      </div>

      <div class="divider-dashed"></div>

      <div class="bottom">
        <p class="copyright">© DevStudios LLABC</p>
        <div class="socials" id="footer-socials"></div>
      </div>
    </div>
  </footer>

<script>
  const links = ["Produtos","Estúdio","Clientes","Preços","Blog","Privacidade","Termos"];
  document.getElementById("footer-nav").innerHTML =
    links.map(l => `<a href="#">${l}</a>`).join("");

  const socials = [
    { label: "Twitter", href: "#" },
    { label: "LinkedIn", href: "#" },
    { label: "GitHub", href: "#" },
    { label: "Facebook", href: "#" },
    { label: "Instagram", href: "#" },
  ];
  document.getElementById("footer-socials").innerHTML =
    socials.map(({ label, href }) => `<a href="${href}">${label}</a>`).join("");
</script>
</body>
</html>
