<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>
<STyle>/* ===========================
        FONTES
        =========================== */

        @font-face {
            font-family: 'TAN-NIMBUS';
            src: url('fontes/TAN-NIMBUS.woff2') format('woff2'),
                 url('fontes/TAN-NIMBUS.woff') format('woff'),
                 url('fontes/TAN-NIMBUS.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --bege:#efd39b;
            --marrom:#5b220b;
            --branco:#ffffff;

        }

        body{

            background:#4b1d08;

            font-family:"Cinzel Decorative" ;

            display: flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            padding:20px;

        }

        /* ===========================
        CARDÁPIO
        =========================== */

        .pagina{

            width:min(1600px,100%);

            background:var(--bege);

            border:4px solid var(--branco);

            outline:2px solid rgba(255,255,255,.5);

            position:relative;

            padding:70px 60px;

        }


        /* ===========================
        DUAS COLUNAS
        =========================== */

        .menu{

            display:grid;

            grid-template-columns:repeat(2,1fr);

            gap:90px;

        }

        /* ===========================
        TÍTULOS
        =========================== */

        h1{

            text-align:center;

            color:var(--marrom);

            font-size:clamp(2.8rem,5vw,5.8rem);

            margin-bottom:45px;

            letter-spacing:0.1em;

        }

        /* ===========================
        LISTA
        =========================== */

        .lista{
            

            display:flex;

            flex-direction:column;

            gap:20px;

        }

        .item{
            font-weight:medium;

            display:grid;

            grid-template-columns:2fr auto;

            align-items:center;

            gap:25px;
            

        }

        /* ===========================
        NOMES
        =========================== */

        .item span{

            color:var(--marrom);

            font-family:"Cinzel Decorative" ;

            font-size:clamp(2.4rem,2.5vw,4rem);

            line-height:1.2;
            

        }

        /* ===========================
        PREÇOS
        =========================== */

        .item strong{

            color:var(--marrom);

            font-family:'TAN-NIMBUS', serif;

            font-size:clamp(2rem,2.8vw,4rem);

            font-weight:normal;

        }

        /* ===========================
        ESPAÇO
        =========================== */

        .espaco{

            height:20px;

        }

        /* ===========================
        RESPONSIVO
        =========================== */

        @media (max-width:1100px){

        .menu{

            gap:45px;

        }

        }

        @media (max-width:900px){

        .pagina{

            padding:90px 35px 40px;

        }

        .menu{

            grid-template-columns:1fr;

            gap:60px;

        }

        h1{

            font-size:clamp(2.5rem,8vw,4rem);

        }

        .item{

            grid-template-columns:1fr auto;

            gap:20px;

        }

        .item span{

            font-size:clamp(2rem,4vw,3rem);

            white-space: normal;

        }

        .item strong{

            font-size:clamp(2rem,4vw,3rem);

        }

        }

        @media (max-width:600px){

        .pagina{

            padding:80px 20px 30px;

        }

        .item{

            display:grid;

            grid-template-columns:1fr;

            align-items:flex-start;

            gap:12px;

        }

        .item span{

            font-size:clamp(1.6rem,4vw,2.2rem);

        }

        .item strong{

            font-size:clamp(1.8rem,4vw,2.6rem);

        }
    }
</STyle>

<body>

    <main class="pagina">

        <!-- Botão voltar -->

        </a>

        <section class="menu">

        </section>

    </main>

</body>

</html>
